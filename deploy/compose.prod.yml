name: openresearchdataplanner
services:
  app:
    image: git.dev.xram.net/atmarx/openresearchdataplanner:latest
    container_name: openresearchdataplanner-prod
    restart: unless-stopped
    ports:
      - "127.0.0.1:3017:3000"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
