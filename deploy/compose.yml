name: openresearchdataplanner
services:
  app:
    image: git.dev.xram.net/atmarx/openresearchdataplanner:latest
    container_name: openresearchdataplanner-app
    restart: unless-stopped
    expose:
      - "3000"
    networks:
      - gateway
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  gateway:
    external: true
    name: gateway-stack_gateway
