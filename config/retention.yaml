# Retention schedules and requirements
# Users select applicable schedules; longest retention wins

schedules:
  - slug: federal-grant-standard
    name: "Federal Grant (Standard)"
    description: "Most federally funded research must keep data for 3 years after the grant closes.  If you're not sure which schedule applies, this is a safe default."
    years: 3
    regulation: "2 CFR 200.334"
    regulation_url: "https://www.ecfr.gov/current/title-2/section-200.334"
    applies_to_tiers:
      - low
      - medium
      - high
    is_post_grant: true
    is_default: true
    archive_required: false

  - slug: nih-gds
    name: "NIH Genomic Data Sharing"
    description: "If your NIH-funded research generates genomic data, the GDS policy requires it to remain accessible for 10 years."
    years: 10
    regulation: "NIH GDS Policy"
    regulation_url: "https://sharing.nih.gov/genomic-data-sharing-policy"
    applies_to_tiers:
      - low
      - medium
      - high
    is_post_grant: true
    is_default: false
    archive_required: true

  - slug: irb-human-subjects
    name: "IRB Human Subjects Research"
    description: "Research with human participants under an IRB protocol requires records for up to 20 years to support potential audits or follow-up studies."
    years: 20
    regulation: "45 CFR 46 / 21 CFR 50"
    regulation_url: "https://www.hhs.gov/ohrp/regulations-and-policy"
    applies_to_tiers:
      - high
    is_post_grant: false
    is_default: false
    archive_required: true
    trigger_question: "Does your research involve human subjects under an IRB protocol?"

  - slug: ferpa
    name: "FERPA Student Records"
    description: "If your research uses student educational records, FERPA requires retaining them for 7 years with access controls in place."
    years: 7
    regulation: "20 U.S.C. § 1232g"
    regulation_url: "https://www2.ed.gov/policy/gen/guid/fpco/ferpa"
    applies_to_tiers:
      - high
    is_post_grant: false
    is_default: false
    archive_required: true
    trigger_question: "Does your research involve student educational records?"

  - slug: export-control
    name: "Export Controlled Data"
    description: "Data subject to export controls (EAR/ITAR) must be retained for 5 years with restricted access — your export control officer can confirm specifics."
    years: 5
    regulation: "EAR/ITAR"
    applies_to_tiers:
      - high
    is_post_grant: true
    is_default: false
    archive_required: true
    trigger_question: "Is your research subject to export controls (EAR/ITAR)?"

# Archive cost calculation settings
archive_settings:
  # When calculating archive costs, assume data reduces to this
  # percentage of active storage (deduplication, cleanup, etc.)
  typical_archive_ratio: 0.7

  # Prompt user to estimate if they expect different
  allow_custom_ratio: true
  custom_ratio_prompt: |
    After your grant ends, some data still needs to be kept in "archive" storage — a
    lower-cost option for data you must retain but won't access regularly.  Not all of
    your active data needs archiving (temporary files, duplicates, and intermediate
    results can usually be cleaned up).  The default 70% is a reasonable starting point.
