# Clinical AI Validation Checklist
# Comprehensive checklist for clinical deployment readiness
# Aligned with FDA Good Machine Learning Practice (2021), FDA AI device guidances (2024-2025),
# and clinical-AI reporting standards (TRIPOD+AI, CONSORT-AI, DECIDE-AI, STARD-AI, PROBAST+AI)

meta:
  applet_id: clinical-validation
  title: Clinical Validation Checklist
  core_question: Is my AI ready for clinical deployment?
  version: "1.1"
  last_updated: "2026-06-26"
  regulatory_basis: "FDA GMLP Guiding Principles (Oct 2021); FDA PCCP final guidance (Dec 2024, current Aug 2025); FDA/HC/MHRA Transparency Principles (June 2024); reporting standards TRIPOD+AI (2024), CONSORT-AI (2020), DECIDE-AI (2022), STARD-AI (2025)"

intro:
  text: |
    Clinical AI requires rigorous validation beyond typical research standards. This checklist
    helps you track readiness for clinical deployment or publication in medical journals. It is
    organized around FDA's Good Machine Learning Practice and the AI-specific reporting guidelines
    now expected by major medical journals.
  source_note: "Sources: FDA/Health Canada/MHRA, Good Machine Learning Practice for Medical Device Development — Guiding Principles (Oct 2021); FDA Marketing Submission Recommendations for a Predetermined Change Control Plan for AI-Enabled Device Software Functions (final Dec 2024; current version Aug 2025); FDA/HC/MHRA Transparency for ML-Enabled Medical Devices (June 2024); EQUATOR reporting guidelines TRIPOD+AI (BMJ 2024), CONSORT-AI & SPIRIT-AI (Nat Med 2020), DECIDE-AI (Nat Med 2022), STARD-AI (Nat Med 2025)."

# Validation sections with items
sections:
  - id: technical
    title: Technical Validation
    description: Does the AI work correctly from a technical standpoint?
    items:
      - id: test-set-performance
        text: Performance measured on held-out test set
        required: true
        details: |
          Training, validation, AND test sets must be completely separate. Test set should
          represent the clinical population where the AI will be deployed.

          Report: sensitivity, specificity, AUC, PPV, NPV (as appropriate for your task)

          Source: TRIPOD+AI statement (Collins et al., BMJ 2024;385:e078378, DOI 10.1136/bmj-2023-078378) — report discrimination, calibration, and clinical-utility metrics on an independent test set.

      - id: confidence-intervals
        text: Performance metrics reported with confidence intervals
        required: true
        details: |
          Single-number accuracy is insufficient. Report 95% confidence intervals for all metrics.

          Example: "Sensitivity: 92.3% (95% CI: 88.7-95.1%)"

          Source: TRIPOD+AI (BMJ 2024) and STARD-AI for diagnostic-accuracy studies (Nat Med 2025;31:3283-3289, DOI 10.1038/s41591-025-03953-8) — report uncertainty (95% CIs) for every performance estimate.

      - id: failure-modes
        text: Known failure modes documented
        required: true
        details: |
          When does your model fail? Document:
          - Edge cases and out-of-distribution inputs
          - Systematic errors or bias patterns
          - Adversarial or unusual inputs
          - Confidence thresholds for flagging uncertain cases

          Source: FDA/HC/MHRA Good Machine Learning Practice (Oct 2021), Principles 8 & 9 (testing demonstrates performance during clinically relevant conditions; users are provided clear, essential information); document via a model card (Mitchell et al., FAccT 2019, DOI 10.1145/3287560.3287596).

      - id: computational-requirements
        text: Computational requirements specified
        required: false
        details: |
          Inference time, memory usage, hardware needed. Can it run in the clinical environment?

          Consider: Is real-time performance required? Batch processing acceptable?

  - id: clinical
    title: Clinical Validity
    description: Does it work for the intended clinical purpose?
    items:
      - id: gold-standard-comparison
        text: Compared to clinical gold standard
        required: true
        details: |
          Not just other AI models. Compare to:
          - Expert clinician diagnosis
          - Pathology/lab confirmed outcomes
          - Established diagnostic criteria

          AI should match or exceed current standard of care.

          Source: STARD-AI reporting guideline for AI diagnostic-accuracy studies (Nat Med 2025;31:3283-3289, DOI 10.1038/s41591-025-03953-8); for prediction models see TRIPOD+AI (BMJ 2024).

      - id: prospective-validation
        text: Prospective validation (not just retrospective)
        required: true
        details: |
          Retrospective data is for development. Prospective data proves clinical utility.

          Prospective validation tests the AI on new, unseen patients as they arrive.

          Source: DECIDE-AI for early live-clinical evaluation (Vasey et al., Nat Med 2022;28:924-933, DOI 10.1038/s41591-022-01772-9); TRIPOD+AI calls for external/temporal validation (BMJ 2024).

      - id: clinician-in-loop
        text: Clinician-in-the-loop testing completed
        required: true
        details: |
          Real clinicians using the AI in realistic workflows:
          - Do they understand the output?
          - Can they act on recommendations?
          - Does it integrate into their workflow?
          - Are there usability issues?

          Source: DECIDE-AI (Nat Med 2022) addresses human factors/usability in the live environment; FDA GMLP Principle 7 (human-AI team performance is evaluated).

      - id: clinical-utility
        text: Clinical utility demonstrated (not just accuracy)
        required: true
        details: |
          Does it improve patient outcomes? Reduce time? Cut costs? Change clinical decisions?

          Accuracy alone doesn't prove utility. You need to show it helps in practice.

          Source: CONSORT-AI extension for randomized trials of AI interventions (Liu et al., Nat Med 2020;26:1364-1374, DOI 10.1038/s41591-020-1034-x); trial protocols use SPIRIT-AI (Nat Med 2020, DOI 10.1038/s41591-020-1037-7).

  - id: bias
    title: Bias & Fairness Audit
    description: Does it work equitably across patient populations?
    items:
      - id: demographic-performance
        text: Performance disaggregated by race, ethnicity, sex, age
        required: true
        details: |
          **Report performance across demographic subgroups.** Disaggregated performance is expected by FDA's Good Machine Learning Practice (representative datasets), reinforced by the FDA/HC/MHRA transparency principles, and is a required disclosure ("source attributes") for predictive decision support under ONC's HTI-1 rule.

          Stratify results by:
          - Race/ethnicity
          - Sex/gender
          - Age groups
          - [Other relevant characteristics for your clinical context]

          Flag and investigate any significant performance differences across groups.

          Sources: FDA/HC/MHRA Good Machine Learning Practice (Oct 2021), Principle 3 (datasets representative of the intended patient population); ONC HTI-1 Final Rule, Decision Support Intervention criterion, 45 CFR § 170.315(b)(11) (89 FR 1192, Jan 9, 2024); Obermeyer et al., "Dissecting racial bias in an algorithm used to manage the health of populations," Science 2019;366:447-453 (DOI 10.1126/science.aax2342). Caveat: ONC's HTI-5 NPRM (Dec 29, 2025) proposes to roll back the DSI transparency requirements — still proposed as of June 2026, so they currently apply.

      - id: representation
        text: Training data demographics documented
        required: true
        details: |
          What populations are represented in training data? What are the gaps?

          Document:
          - Demographic breakdown of training/validation/test sets
          - Known underrepresented groups
          - Geographic diversity (if relevant)

          Source: document the dataset with a "Datasheet for Datasets" (Gebru et al., Commun. ACM 2021;64(12):86-92, DOI 10.1145/3458723) and MINIMAR reporting (Hernandez-Boussard et al., JAMIA 2020;27:2011-2015, DOI 10.1093/jamia/ocaa088); FDA GMLP Principle 3 (clinical study representative of intended population).

      - id: bias-mitigation
        text: Bias mitigation strategies implemented if disparities found
        required: true
        details: |
          If performance differs across groups, document mitigation:
          - Re-sampling or re-weighting training data
          - Fairness constraints in training
          - Ensemble methods for underrepresented groups
          - If mitigation not possible, document limitations

          Source: NIST SP 1270, "Towards a Standard for Identifying and Managing Bias in Artificial Intelligence" (March 2022, DOI 10.6028/NIST.SP.1270); NIST AI Risk Management Framework 1.0 (NIST AI 100-1, Jan 2023). Appraise study risk-of-bias with PROBAST+AI (Moons et al., BMJ 2025, DOI 10.1136/bmj-2024-082505).

      - id: external-validation
        text: External validation on diverse sites/populations
        required: false
        details: |
          Test at hospitals beyond your development site:
          - Different patient populations
          - Different equipment/imaging protocols
          - Different clinical workflows

          Proves generalizability beyond your institution.

          Source: TRIPOD+AI (BMJ 2024) emphasizes external/independent validation; WHO, Ethics and governance of AI for health — guidance on large multi-modal models (Jan 2024), calls for multi-site evaluation before deployment.

  - id: deployment
    title: Deployment Readiness
    description: Can it be safely deployed in clinical settings?
    items:
      - id: integration-testing
        text: Integration testing with clinical systems (EMR, PACS, etc.)
        required: true
        details: |
          Does it work with real clinical IT infrastructure?
          - EMR integration tested
          - Data flow verified
          - Authentication/authorization working
          - Handles EMR downtime gracefully

      - id: error-handling
        text: Error handling and fallback procedures defined
        required: true
        details: |
          What happens when AI fails? Document:
          - How clinicians are notified of failures
          - Fallback to manual/traditional methods
          - User-friendly error messages
          - Escalation procedures

      - id: monitoring-plan
        text: Post-deployment monitoring plan established
        required: true
        details: |
          How will you detect performance degradation?
          - What metrics are tracked?
          - Alert thresholds?
          - Frequency of monitoring?
          - Who receives alerts?

          Source: FDA GMLP Principle 10 (deployed models are monitored for performance); FDA Predetermined Change Control Plan guidance (final Dec 2024) governs pre-specified model updates; CHAI Assurance Standards Guide (2024) covers deployment and ongoing monitoring across the AI lifecycle.

      - id: adverse-event-reporting
        text: Adverse event reporting mechanism in place
        required: true
        details: |
          How are clinical errors or patient harms reported and tracked?
          - Incident reporting system integrated
          - Criteria for AI-related adverse events defined
          - Review process for incidents

          Source: for FDA-cleared/approved devices, Medical Device Reporting applies (21 CFR Part 803); align local incident criteria with your institution's patient-safety and device-vigilance processes.

      - id: user-training
        text: Clinician training materials prepared
        required: true
        details: |
          How will clinicians learn to use this?
          - Training modules or sessions
          - Quick reference guides
          - Prerequisites (technical literacy)
          - Competency assessment

      - id: rollback-plan
        text: Rollback plan if deployment fails
        required: true
        details: |
          Can you safely remove this from clinical workflow if needed?
          - Documented rollback procedure
          - Data preservation during rollback
          - Communication plan for users
          - Decision criteria for rollback

# Export template for validation report
validation_report_template: |
  # Clinical AI Validation Report

  **System:** [AI system name]
  **Date:** {{date}}
  **Reviewer:** {{reviewer}}

  ## Validation Status

  {{#each sections}}
  ### {{title}}
  {{#each items}}
  - [{{#if checked}}✓{{else}} {{/if}}] {{text}} {{#if required}}(Required){{else}}(Optional){{/if}}
  {{/each}}
  {{/each}}

  ## Summary

  **Completed:** {{completed}} / {{total_required}} required items ({{percent}}%)

  **Status:** {{#if all_required_complete}}✓ Ready for clinical deployment{{else}}⚠ Additional validation needed{{/if}}

  ## Next Steps

  {{#unless all_required_complete}}
  The following required items must be completed:
  {{#each missing_required}}
  - {{text}}
  {{/each}}
  {{/unless}}

